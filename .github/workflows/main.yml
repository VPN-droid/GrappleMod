name: Build REAL Grapple Mod

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Download BepInEx
      run: |
        curl -L -o bepinex.zip https://github.com/BepInEx/BepInEx/releases/download/v5.4.23.2/BepInEx_x64_5.4.23.2.zip
        powershell -Command "Expand-Archive bepinex.zip -DestinationPath bepinex"

    - name: Compile DLL (fixed path)
      shell: pwsh
      run: |
        $bep = Get-ChildItem -Recurse -Filter BepInEx.dll | Select-Object -First 1
        Write-Host "Using BepInEx at:" $bep.FullName

        & "C:\Windows\Microsoft.NET\Framework\v4.0.30319\csc.exe" `
        -target:library `
        -out:GrappleMod.dll `
        -reference:Assembly-CSharp.dll `
        -reference:$($bep.FullName) `
        GrappleMod.cs

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: GrappleMod
        path: GrappleMod.dll
