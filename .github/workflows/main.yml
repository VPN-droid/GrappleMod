name: Build Grapple Mod

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Create dummy UnityEngine
      run: |
        echo namespace UnityEngine { > UnityEngine.cs
        echo public class MonoBehaviour {} >> UnityEngine.cs
        echo public static class Input { public static bool GetMouseButtonDown(int x) { return false; } } >> UnityEngine.cs
        echo public static class Time { public static float time = 0f; } >> UnityEngine.cs
        echo public static class Debug { public static void Log(string s) {} } >> UnityEngine.cs
        echo } >> UnityEngine.cs

    - name: Create dummy BepInEx
      run: |
        echo namespace BepInEx { > BepInEx.cs
        echo public class BaseUnityPlugin : UnityEngine.MonoBehaviour {} >> BepInEx.cs
        echo public class BepInPlugin : System.Attribute { public BepInPlugin(string a,string b,string c) {} } >> BepInEx.cs
        echo } >> BepInEx.cs

    - name: Compile DLL
      run: |
        & "C:\Windows\Microsoft.NET\Framework\v4.0.30319\csc.exe" -target:library -out:GrappleMod.dll GrappleMod.cs UnityEngine.cs BepInEx.cs

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: GrappleMod
        path: GrappleMod.dll
