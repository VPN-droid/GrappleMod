name: Build Grapple Mod

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Download Unity + BepInEx dependencies
      run: |
        curl -L -o unity.zip https://github.com/Unity-Technologies/UnityCsReference/archive/refs/heads/master.zip
        powershell -Command "Expand-Archive unity.zip -DestinationPath unity"

        curl -L -o bepinex.zip https://github.com/BepInEx/BepInEx/releases/download/v5.4.23.2/BepInEx_x64_5.4.23.2.zip
        powershell -Command "Expand-Archive bepinex.zip -DestinationPath bepinex"

    - name: Compile DLL
      run: |
        csc -target:library -out:GrappleMod.dll GrappleMod.cs

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: GrappleMod
        path: GrappleMod.dll
