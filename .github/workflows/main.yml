name: Build REAL Grapple Mod

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Download BepInEx core DLL
      run: |
        curl -L -o BepInEx.dll https://github.com/BepInEx/BepInEx/raw/master/BepInEx/core/BepInEx.dll

    - name: Compile DLL
      shell: pwsh
      run: |
        & "C:\Windows\Microsoft.NET\Framework\v4.0.30319\csc.exe" `
        -target:library `
        -out:GrappleMod.dll `
        -reference:Assembly-CSharp.dll `
        -reference:BepInEx.dll `
        GrappleMod.cs

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: GrappleMod
        path: GrappleMod.dll
